version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caspercloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    command: ["api"]
    depends_on:
      - db
      - rabbitmq
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/caspercloud?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      JWT_SECRET: "dev-secret"
      LIBVIRT_URI: "qemu:///system"
      VM_DEFAULT_RAM_MB: "2048"
      VM_DEFAULT_VCPU: "2"
      VM_STORAGE_DIR: "/var/lib/libvirt/images"
    ports:
      - "8080:8080"

  worker:
    build: .
    command: ["worker"]
    depends_on:
      - db
      - rabbitmq
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/caspercloud?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      JWT_SECRET: "dev-secret"
      LIBVIRT_URI: "qemu:///system"
      VM_DEFAULT_RAM_MB: "2048"
      VM_DEFAULT_VCPU: "2"
      VM_STORAGE_DIR: "/var/lib/libvirt/images"

volumes:
  pgdata:
