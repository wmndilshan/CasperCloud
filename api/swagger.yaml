        $ref: '#/definitions/caspercloud_internal_repository.Instance'
    type: object
  internal_httpapi.docInstancesData:
    properties:
      data:
        items:
          $ref: '#/definitions/caspercloud_internal_repository.Instance'
        type: array
    type: object
  internal_httpapi.docProjectData:
    properties:
      data:
        $ref: '#/definitions/caspercloud_internal_repository.Project'
    type: object
  internal_httpapi.docProjectsData:
    properties:
      data:
        items:
          $ref: '#/definitions/caspercloud_internal_repository.Project'
        type: array
    type: object
  internal_httpapi.docStatusOK:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
