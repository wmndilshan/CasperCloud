securityDefinitions:
  BearerAuth:
    description: JWT from POST /v1/auth/login or /v1/auth/register. Prefix value with
      "Bearer " (e.g. `Bearer eyJhbG...`).
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
