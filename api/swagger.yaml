host: localhost:8080
info:
  contact: {}
  description: 'HTTP API for CasperCloud (multi-tenant projects, images, instances).
    Authenticated routes expect `Authorization: Bearer <JWT>`. Project-scoped routes
    require a token whose `active_project_id` matches the path `projectID` (use login
    with `project_id` or POST /v1/auth/switch-project).'
  title: CasperCloud API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Liveness endpoint; no authentication required.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docHealthData'
      summary: Health check
      tags:
      - system
  /v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docAuthData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_httpapi.docAuthData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register
      tags:
      - auth
  /v1/auth/switch-project:
    post:
      consumes:
      - application/json
      description: Returns a new token whose active_project_id matches the requested
        project (must be a member).
      parameters:
      - description: Target project
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.switchProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docAuthData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Switch active project
      tags:
      - auth
  /v1/projects:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docProjectsData'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a new project and adds the caller as owner.
      parameters:
      - description: Project name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.createProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_httpapi.docProjectData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create project
      tags:
      - projects
  /v1/projects/{projectID}/images:
    get:
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docImagesData'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List images
      tags:
      - images
    post:
      consumes:
      - application/json
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Image metadata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.imageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_httpapi.docImageData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create image
      tags:
      - images
  /v1/projects/{projectID}/images/{imageID}:
    delete:
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Image UUID
        in: path
        name: imageID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete image
      tags:
      - images
    get:
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Image UUID
        in: path
        name: imageID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docImageData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get image
      tags:
      - images
    put:
      consumes:
      - application/json
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Image UUID
        in: path
        name: imageID
        required: true
        type: string
      - description: Image metadata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.imageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.docImageData'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update image
      tags:
      - images
  /v1/projects/{projectID}/instances:
    get:
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
