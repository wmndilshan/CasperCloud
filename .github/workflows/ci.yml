name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvirt (CGO)
        run: sudo apt-get update && sudo apt-get install -y libvirt-dev

      - name: Download dependencies
        run: go mod download
        env:
          CGO_ENABLED: "1"

      - name: Sync module metadata
        run: go mod tidy
        env:
          CGO_ENABLED: "1"

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: "1"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "1"

      - name: Build
        run: go build ./...
        env:
          CGO_ENABLED: "1"
