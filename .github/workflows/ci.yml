name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/caspercloud?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      JWT_SECRET: ci-test-secret-not-for-production

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: caspercloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d caspercloud"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (latest stable on CI)
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Go version
        run: go version

      - name: Check formatting (fail fast)
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Install native dependencies (CGO / libvirt)
        run: sudo apt-get update && sudo apt-get install -y libvirt-dev libxml2-dev pkg-config gcc

      - name: Download dependencies
        run: go mod download

      - name: Sync module metadata
        run: go mod tidy

      - name: Vet (fail fast)
        run: go vet ./...

      - name: Wait for Postgres and RabbitMQ
        run: |
          wait_for_port() {
            local port=$1 name=$2
            for i in $(seq 1 60); do
              if (echo > /dev/tcp/127.0.0.1/"$port") >/dev/null 2>&1; then
                echo "$name accepting TCP on $port"
                return 0
              fi
              sleep 1
            done
            echo "$name not ready on port $port"
            return 1
          }
          wait_for_port 5432 Postgres
          wait_for_port 5672 RabbitMQ

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
